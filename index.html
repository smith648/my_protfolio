<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="style.css">
  <title>protfolio</title>
</head>

<body>
  <div class="hero-background">
    <header>
      <div class="logo">
        <img src="/imgs/dev.png" alt="logo">
      </div>
      <div class="nav">
        <nav>
          <ul>
            <li><a href="#home">home</a></li>
            <li><a href="#about">about</a></li>
            <li><a href="#skills">skills</a></li>
            <li><a href="#contact">contact</a></li>
            <li><a href="#footer">footer</a></li>
          </ul>
        </nav>
      </div>
      <div class="header-contact">
        <button class="btn">contact</button>
      </div>
      <div class="mode-toggle">
        <ul>
          <li><button class="btnSun"><i class="bi bi-brightness-high-fill"></i></button></li>
          <li><button class="btnNight"><i class="bi bi-stars"></i><button></li>
        </ul>
      </div>
    </header>
    <main>
      <div class="hero">
        <div class="hero-left">
        </div>
        <div class="hero-right">
          <img id="avatar" src="imgs/moon.png" alt="avatar">
          <div class="clouds-wrapper">
            <img id="clouds" src="imgs/clouds.png" alt="clouds">
          </div>
          <img id="clouds1" src="imgs/clouds.png" alt="clouds">
        </div>
    </main>
  </div>
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
  integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</html>
